<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Roblox Stealth Bypass FIX</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #00ff88; text-align: center; width: 350px; }
        h1 { color: #00ff88; font-size: 20px; }
        input { margin: 20px 0; display: block; width: 100%; }
        button { background: #00ff88; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Stealth Bypass FIX</h1>
        <p style="font-size: 11px; color: #888;">Optimizado para evitar bloqueos del navegador.</p>
        
        <input type="file" id="audioInput" accept="audio/*">
        
        <button onclick="processAudio()">PROCESAR Y DESCARGAR</button>
        <div id="status">Esperando archivo...</div>
    </div>

    <script>
        async function processAudio() {
            const input = document.getElementById('audioInput');
            const status = document.getElementById('status');
            
            if (input.files.length === 0) return alert("Selecciona un audio primero");

            status.innerText = "PROCESANDO... (No cierres la pestaña)";
            status.style.color = "#ffaa00";

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await input.files[0].arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                // Forzamos 1 canal (Mono) para que pese menos de 20MB
                const newBuffer = audioCtx.createBuffer(1, audioBuffer.length, audioBuffer.sampleRate);
                const oldData = audioBuffer.getChannelData(0);
                const newData = newBuffer.getChannelData(0);

                // Bypass Técnico: Inversión de fase + Hash Randomizer
                for (let i = 0; i < audioBuffer.length; i++) {
                    let s = oldData[i] * -0.98; // Inversión de fase
                    s += (Math.random() * 2 - 1) * 0.005; // Ruido Dither (cambia el hash)
                    newData[i] = s;
                }

                // Generar WAV manualmente (más rápido)
                const wavBuffer = bufferToWav(newBuffer);
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                
                // Forzar descarga
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "bypass_ready_" + Date.now() + ".wav";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                status.innerText = "¡DESCARGADO CON ÉXITO!";
                status.style.color = "#00ff88";
            } catch (e) {
                console.error(e);
                status.innerText = "ERROR: El audio es demasiado largo.";
                status.style.color = "#ff4444";
            }
        }

        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels,
                length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length),
                view = new DataView(buffer),
                pos = 0;

            const setU32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            const setU16 = (d) => { view.setUint16(pos, d, true); pos += 2; };

            setU32(0x46464952); setU32(length - 8); setU32(0x45564157);
            setU32(0x20746d66); setU32(16); setU16(1); setU16(numOfChan);
            setU32(abuffer.sampleRate); setU32(abuffer.sampleRate * 2 * numOfChan);
            setU16(numOfChan * 2); setU16(16); setU32(0x61746164); setU32(length - pos - 4);

            const data = abuffer.getChannelData(0);
            for (let i = 0; i < abuffer.length; i++) {
                let s = Math.max(-1, Math.min(1, data[i]));
                view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
                pos += 2;
            }
            return buffer;
        }
    </script>
</body>
</html>
