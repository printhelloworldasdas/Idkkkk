<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio Studio Pro - Suite de Optimización</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 420px; text-align: center; border-top: 5px solid #2ecc71; }
        h1 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
        p { color: #7f8c8d; font-size: 13px; margin-bottom: 30px; }
        .control-panel { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        label { display: block; font-size: 11px; color: #34495e; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input[type="range"] { width: 100%; margin-bottom: 20px; accent-color: #2ecc71; cursor: pointer; }
        input[type="file"] { margin: 10px 0; font-size: 13px; width: 100%; }
        button { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; transition: background 0.3s; }
        button:hover { background: #27ae60; }
        #log { margin-top: 15px; font-size: 12px; color: #95a5a6; font-family: monospace; }
        .status-dot { height: 8px; width: 8px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Audio Studio Optimizer</h1>
    <p>Herramienta de limpieza y normalización de frecuencias dinámicas.</p>
    
    <input type="file" id="audioSource" accept="audio/*">
    
    <div class="control-panel">
        <label>Saturación de Armónicos (Filtro Anti-Ruido):</label>
        <input type="range" id="harmonics" min="1" max="5" step="0.2" value="2.2">
        
        <label>Dither de Seguridad (Limpieza de Hash):</label>
        <input type="range" id="dither" min="0.002" max="0.012" step="0.001" value="0.005">
    </div>

    <button id="mainBtn" onclick="runOptimization()">OPTIMIZAR Y EXPORTAR .WAV</button>
    <div id="log"><span class="status-dot"></span> SISTEMA ESTABLE</div>
</div>

<script>
    async function runOptimization() {
        const fileInput = document.getElementById('audioSource');
        if (fileInput.files.length === 0) return alert("Cargue un recurso de audio.");

        const btn = document.getElementById('mainBtn');
        const log = document.getElementById('log');

        btn.disabled = true;
        log.innerText = "ANALIZANDO ESPECTRO...";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await fileInput.files[0].arrayBuffer();
        const buffer = await audioCtx.decodeAudioData(arrayBuffer);

        const outBuffer = audioCtx.createBuffer(1, buffer.length, buffer.sampleRate);
        const inputData = buffer.getChannelData(0);
        const outputData = outBuffer.getChannelData(0);

        const satValue = parseFloat(document.getElementById('harmonics').value);
        const ditherValue = parseFloat(document.getElementById('dither').value);

        log.innerText = "NORMALIZANDO SEÑAL...";

        for (let i = 0; i < buffer.length; i++) {
            let s = inputData[i] * satValue;
            if (s > 0.96) s = 0.96; if (s < -0.96) s = -0.96;
            outputData[i] = (s * 0.99) + (Math.random() * ditherValue - ditherValue / 2);
        }

        log.innerText = "EMPAQUETANDO RECURSO...";
        const wavData = buildWav(outBuffer);
        const finalBlob = new Blob([wavData], { type: 'audio/wav' });
        
        const downloadUrl = URL.createObjectURL(finalBlob);
        const link = document.createElement('a');
        link.href = downloadUrl;
        link.download = "optimized_audio_render_" + Date.now() + ".wav";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);

        log.innerText = "EXPORTACIÓN FINALIZADA (" + (wavData.byteLength/1024/1024).toFixed(2) + " MB)";
        btn.disabled = false;
    }

    function buildWav(abuffer) {
        let length = abuffer.length * 2 + 44;
        let buffer = new ArrayBuffer(length);
        let view = new DataView(buffer);
        let pos = 0;
        const u32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        const u16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
        u32(0x46464952); u32(length - 8); u32(0x45564157);
        u32(0x20746d66); u32(16); u16(1); u16(1);
        u32(abuffer.sampleRate); u32(abuffer.sampleRate * 2);
        u16(2); u16(16); u32(0x61746164); u32(length - pos - 4);
        const data = abuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            let s = Math.max(-1, Math.min(1, data[i]));
            view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
            pos += 2;
        }
        return buffer;
    }
</script>
</body>
</html>
