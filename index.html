<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Roblox Stealth Bypass Ultra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); width: 400px; text-align: center; }
        h1 { color: #00ff88; font-size: 22px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        p { color: #888; font-size: 12px; margin-bottom: 20px; }
        .slider-group { text-align: left; background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #00ff88; margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; margin-bottom: 15px; accent-color: #00ff88; cursor: pointer; }
        input[type="file"] { margin-bottom: 20px; font-size: 12px; color: #888; }
        button { background: #00ff88; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: scale(1.02); }
        #status { margin-top: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h1>Stealth Bypass Ultra</h1>
    <p>Máxima probabilidad de evasión de bots (Filtro Telefónico + Hash)</p>
    
    <input type="file" id="audioInput" accept="audio/*">
    
    <div class="slider-group">
        <label>CAMUFLAJE DE VOZ (FILTRO PASA-BANDA):</label>
        <input type="range" id="stealthLevel" min="0.5" max="2" step="0.1" value="1.2">
        
        <label>DISTORSIÓN DE HASH (RUIDO DITHER):</label>
        <input type="range" id="noiseLevel" min="0.002" max="0.01" step="0.001" value="0.004">
    </div>

    <button onclick="stealthProcess()">PROCESAR PARA ROBLOX</button>
    <div id="status">Esperando archivo...</div>
</div>

<script>
    async function stealthProcess() {
        const input = document.getElementById('audioInput');
        const status = document.getElementById('status');
        if (input.files.length === 0) return alert("Selecciona un audio");

        status.innerText = "Aplicando capas de ofuscación...";
        status.style.color = "#00ff88";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await input.files.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        // CONFIGURACIÓN ULTRA: Mono para <20MB
        const newBuffer = audioCtx.createBuffer(1, audioBuffer.length, audioBuffer.sampleRate);
        const data = audioBuffer.getChannelData(0);
        const output = newBuffer.getChannelData(0);

        const stealth = parseFloat(document.getElementById('stealthLevel').value);
        const noise = parseFloat(document.getElementById('noiseLevel').value);

        for (let i = 0; i < audioBuffer.length; i++) {
            let s = data[i];

            // 1. Capa de Tremolo (Variación de amplitud imperceptible 1Hz)
            const tremolo = 1 + 0.01 * Math.sin(2 * Math.PI * 1 * (i / audioBuffer.sampleRate));
            s *= tremolo;

            // 2. Inversión de Fase y Saturación (Soft Clip)
            s = s * -1.02 * stealth;
            if (s > 0.98) s = 0.98; if (s < -0.98) s = -0.98;

            // 3. Inyección de Ruido Blanco (Hash randomization)
            s += (Math.random() * 2 - 1) * noise;

            output[i] = s;
        }

        // Generación de archivo
        const wavData = createWav(newBuffer);
        const sizeMB = (wavData.byteLength / (1024 * 1024)).toFixed(2);

        if (sizeMB > 19.9) {
            status.innerText = `PESO EXCEDIDO: ${sizeMB}MB. Acorta el audio.`;
            status.style.color = "#ff4444";
        } else {
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `stealth_audio_${Date.now()}.wav`;
            a.click();
            status.innerText = `¡ÉXITO! Peso: ${sizeMB}MB. Listo para subir.`;
        }
    }

    function createWav(abuffer) {
        let length = abuffer.length * 2 + 44;
        let buffer = new ArrayBuffer(length);
        let view = new DataView(buffer);
        let pos = 0;

        const u32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        const u16 = (d) => { view.setUint16(pos, d, true); pos += 2; };

        u32(0x46464952); u32(length - 8); u32(0x45564157);
        u32(0x20746d66); u32(16); u16(1); u16(1);
        u32(abuffer.sampleRate); u32(abuffer.sampleRate * 2);
        u16(2); u16(16); u32(0x61746164); u32(length - pos - 4);

        const data = abuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            let s = Math.max(-1, Math.min(1, data[i]));
            view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
            pos += 2;
        }
        return buffer;
    }
</script>
</body>
</html>
</script>

</body>
</html>
